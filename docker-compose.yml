services:
  postgres:
    image: postgres:15-alpine
    container_name: south-beach-wynwood-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: south_beach_wynwood
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: